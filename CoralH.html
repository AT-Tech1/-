<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> كورال حضانة </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background-image: url('photo_2025-06-09_17-02-57.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      color: #fff;
      font-size: 1.25rem;
    }

    .container {
      animation: fadeInDown 1.5s ease-in-out;
      padding: 2rem;
    }

    h2 {
      font-weight: bold;
      color: #fff;
      font-size: 2.5rem;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    .accordion-item {
      border-radius: 15px;
      background-color: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(5px);
      border: none;
      margin-bottom: 1.5rem;
      color: #fff;
    }

    .accordion-button {
      background-color: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 1.5rem;
      border-radius: 15px;
      padding: 1.25rem;
    }

    .accordion-button:not(.collapsed) {
      background-color: #ffc107;
      color: #000;
    }

    .accordion-body {
      padding: 1.5rem;
    }

    .accordion-body p {
      font-size: 1.25rem;
    }

    .accordion-body img {
      max-width: 100%;
      width: 400px;
      border-radius: 10px;
      margin-bottom: 1rem;
    }

    audio {
      width: 100%;
      max-width: 400px;
      margin-bottom: 1rem;
    }

    ul {
      padding-right: 1.5rem;
    }

    li {
      font-size: 1.25rem;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      body {
        font-size: 1.1rem;
      }

      h2 {
        font-size: 2rem;
      }

      .accordion-button {
        font-size: 1.25rem;
        padding: 1rem;
      }

      .accordion-body p, .accordion-body li {
        font-size: 1.1rem;
      }

      .accordion-body img, audio {
        width: 100%;
        max-width: 300px;
      }
    }
  </style>
  <link rel="stylesheet" href="assets/church-style.css">
</head>
<body>
  <div class="container py-5">
    <h2 class="mb-4 text-center"> كورال حضانة </h2>
    <div class="accordion" id="melodiesAccordion">
      <div class="accordion-item">
        <h2 class="accordion-header" id="melodyOne">
          <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne">
             الشعار: اثبت على ما تعلمت
          </button>
        </h2>
        <div id="collapseOne" class="accordion-collapse collapse" data-bs-parent="#melodiesAccordion">
          <div class="accordion-body">
            <p><strong>الكلمات:</strong></p>
            <img src="C.jpg" alt="كلمات " class="img-fluid rounded mb-3">
            <p><strong>الفويس:</strong></p>
            <ul>
              <li>الفويس: <audio controls src="C1.mp3"></audio></li>
            </ul>
          </div>
        </div>
      </div>

      <div class="accordion-item mt-3">
        <h2 class="accordion-header" id="melodyTwo">
          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTwo">
           ترنيمة 1: قصة وآيه  
          </button>
        </h2>
        <div id="collapseTwo" class="accordion-collapse collapse" data-bs-parent="#melodiesAccordion">
          <div class="accordion-body">
            <p><strong>الكلمات:</strong></p>
            <img src="" alt="كلمات" class="img-fluid rounded mb-3">
            <p><strong>الفويس:</strong></p>
            <ul>
              <li>الفويس: <audio controls src="h1.m4a"></audio></li>
            </ul>
          </div>
        </div>
      </div>

      <div class="accordion-item mt-3">
        <h2 class="accordion-header" id="melodyThree">
          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseThree">
           ترنيمة 2: دوبى دوبى فينا  
          </button>
        </h2>
        <div id="collapseThree" class="accordion-collapse collapse" data-bs-parent="#melodiesAccordion">
          <div class="accordion-body">
            <p><strong>الكلمات:</strong></p>
            <img src="h7.jpg" alt="كلمات" class="img-fluid rounded mb-3">
            <p><strong>الفويس:</strong></p>
            <ul>
              <li>الفويس: <audio controls src="H2.mp3"></audio></li>
            </ul>
          </div>
        </div>
      </div>

      <div class="accordion-item mt-3">
        <h2 class="accordion-header" id="melodyFour">
          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseFour">
           ترنيمة 3: انا لسة بتعلم اكتب  
          </button>
        </h2>
        <div id="collapseFour" class="accordion-collapse collapse" data-bs-parent="#melodiesAccordion">
          <div class="accordion-body">
            <p><strong>الكلمات:</strong></p>
            <img src="h6.jpg" alt="كلمات" class="img-fluid rounded mb-3">
            <p><strong>الفويس:</strong></p>
            <ul>
              <li>الفويس: <audio controls src=""></audio></li>
            </ul>
          </div>
        </div>
      </div>

       <div class="accordion-item mt-3">
        <h2 class="accordion-header" id="melodyFive">
          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseFive">
            لحن الكورال: مرد احد الشعانين  
          </button>
        </h2>
        <div id="collapseFive" class="accordion-collapse collapse" data-bs-parent="#melodiesAccordion">
          <div class="accordion-body">
            <p><strong>الكلمات:</strong></p>
            <img src="ح7.jpg" alt="كلمات" class="img-fluid rounded mb-3">
            <p><strong>الفويس:</strong></p>
            <ul>
              <li>الفويس: <audio controls src="حضانة5.mp3"></audio></li>
            </ul>
          </div>
        </div>
      </div>
      
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/church-app.js"></script>

  <!-- ====== شاشة قريبًا ====== -->
  <style>
    #coming-soon-overlay {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      animation: csOverlayIn 0.9s ease both;
    }

    @keyframes csOverlayIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    #coming-soon-overlay .cs-card {
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(255, 193, 7, 0.45);
      border-radius: 28px;
      padding: 3rem 2.5rem 2.5rem;
      text-align: center;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 8px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,193,7,0.12);
      animation: csCardIn 1s 0.2s ease both;
    }

    @keyframes csCardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    #coming-soon-overlay .cs-icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
      animation: csPulse 2.4s ease-in-out infinite;
    }

    @keyframes csPulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.12); }
    }

    #coming-soon-overlay h1 {
      font-family: 'Cairo', sans-serif;
      font-size: clamp(2rem, 7vw, 2.8rem);
      font-weight: 700;
      color: #ffc107;
      text-shadow: 0 2px 12px rgba(255,193,7,0.4);
      margin-bottom: 0.6rem;
    }

    #coming-soon-overlay p {
      font-family: 'Cairo', sans-serif;
      font-size: clamp(1rem, 4vw, 1.2rem);
      color: rgba(255,255,255,0.82);
      margin-bottom: 0;
      line-height: 1.8;
    }

    #coming-soon-overlay .cs-dots {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 2rem;
    }

    #coming-soon-overlay .cs-dots span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ffc107;
      opacity: 0.3;
      animation: csDot 1.4s ease-in-out infinite;
    }

    #coming-soon-overlay .cs-dots span:nth-child(2) { animation-delay: 0.2s; }
    #coming-soon-overlay .cs-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes csDot {
      0%, 80%, 100% { opacity: 0.3; transform: scale(1); }
      40%           { opacity: 1;   transform: scale(1.35); }
    }
  </style>

  <div id="coming-soon-overlay">
    <div class="cs-card">
      <div class="cs-icon">🎵</div>
      <h1>قريبًا</h1>
      <div class="cs-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>
  <!-- ====== نهاية شاشة قريبًا ====== -->

</body>
</html>
