<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ألحان خامسة و سادسة موهوبين</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background-image: url('photo_2025-06-09_17-02-57.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      color: #fff;
      font-size: 1.25rem;
    }

    .container {
      animation: fadeInDown 1.5s ease-in-out;
      padding: 2rem;
    }

    h2 {
      font-weight: bold;
      color: #fff;
      font-size: 2.5rem;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    .accordion-item {
      border-radius: 15px;
      background-color: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(5px);
      border: none;
      margin-bottom: 1.5rem;
      color: #fff;
    }

    .accordion-button {
      background-color: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 1.5rem;
      border-radius: 15px;
      padding: 1.25rem;
    }

    .accordion-button:not(.collapsed) {
      background-color: #ffc107;
      color: #000;
    }

    .accordion-body {
      padding: 1.5rem;
    }

    .accordion-body p {
      font-size: 1.25rem;
    }

    .accordion-body img {
      max-width: 100%;
      width: 400px;
      border-radius: 10px;
      margin-bottom: 1rem;
    }

    .accordion-body embed {
      max-width: 100%;
      width: 400px;
      height: 500px;
      border-radius: 10px;
      margin-bottom: 1rem;
    }

    audio {
      width: 100%;
      max-width: 400px;
      margin-bottom: 1rem;
    }

    ul {
      padding-right: 1.5rem;
    }

    li {
      font-size: 1.25rem;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      body {
        font-size: 1.1rem;
      }

      h2 {
        font-size: 2rem;
      }

      .accordion-button {
        font-size: 1.25rem;
        padding: 1rem;
      }

      .accordion-body p, .accordion-body li {
        font-size: 1.1rem;
      }

      .accordion-body img, .accordion-body embed, audio {
        width: 100%;
        max-width: 300px;
      }

      .accordion-body embed {
        height: 400px;
      }
    }
  </style>
  <link rel="stylesheet" href="assets/church-style.css">


<style id="professional-mobile-responsive">
/* Preserve the professional desktop look, only adapt sizing/layout for phones */
:root{
  --mobile-page-pad: clamp(14px, 4vw, 22px);
  --mobile-radius: 18px;
}

html{
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

html, body{
  width:100%;
  max-width:100%;
  overflow-x:hidden !important;
}

*, *::before, *::after{
  box-sizing:border-box;
}

img, video, canvas, svg, iframe{
  max-width:100% !important;
  height:auto !important;
}

audio{
  width:100% !important;
  max-width:100% !important;
}

table{
  width:100%;
  max-width:100%;
  border-collapse:collapse;
}

@media (max-width: 820px){
  body{
    margin:0 !important;
    min-width:0 !important;
    font-size:16px !important;
    line-height:1.75 !important;
  }

  header, nav, main, section, article, footer,
  .container, .wrapper, .content, .page, .card, .box{
    width:100% !important;
    max-width:100% !important;
  }

  header, main, section, article, footer,
  .container, .wrapper, .content, .page{
    padding-left:var(--mobile-page-pad) !important;
    padding-right:var(--mobile-page-pad) !important;
  }

  h1{
    font-size:clamp(28px, 8vw, 42px) !important;
    line-height:1.25 !important;
    letter-spacing:0 !important;
  }

  h2{
    font-size:clamp(23px, 6.3vw, 32px) !important;
    line-height:1.3 !important;
  }

  h3{
    font-size:clamp(19px, 5.2vw, 26px) !important;
    line-height:1.35 !important;
  }

  p, li, a, label, input, textarea, select, button{
    font-size:clamp(15px, 4.2vw, 18px) !important;
  }

  nav, nav ul, .nav, .navbar, .menu{
    display:flex !important;
    flex-wrap:wrap !important;
    justify-content:center !important;
    align-items:center !important;
    gap:10px !important;
  }

  nav ul, .menu{
    padding:0 !important;
    margin:0 !important;
    list-style:none !important;
  }

  nav a, .nav a, .navbar a, .menu a,
  button, .btn, input[type="button"], input[type="submit"]{
    min-height:44px !important;
    padding:10px 14px !important;
    border-radius:999px !important;
    display:inline-flex !important;
    align-items:center !important;
    justify-content:center !important;
    text-align:center !important;
    white-space:normal !important;
  }

  .grid, .cards, .row, .columns, .services, .gallery{
    display:grid !important;
    grid-template-columns:1fr !important;
    gap:16px !important;
  }

  [style*="display:flex"], .flex{
    flex-wrap:wrap !important;
  }

  .card, .box, .item, .service, .lesson, .hymn{
    width:100% !important;
    max-width:100% !important;
    border-radius:var(--mobile-radius) !important;
    margin-left:auto !important;
    margin-right:auto !important;
  }

  input, textarea, select{
    width:100% !important;
    max-width:100% !important;
    min-height:44px !important;
  }

  table{
    display:block !important;
    overflow-x:auto !important;
    white-space:nowrap !important;
    -webkit-overflow-scrolling:touch !important;
  }

  iframe{
    width:100% !important;
    min-height:220px !important;
  }

  .theme-toggle,
  .theme-toggle-btn,
  #themeToggle,
  #theme-toggle{
    width:52px !important;
    height:52px !important;
    min-width:52px !important;
    min-height:52px !important;
    position:fixed !important;
    bottom:18px !important;
    left:18px !important;
    right:auto !important;
    z-index:999999 !important;
    border-radius:50% !important;
    padding:0 !important;
  }
}

@media (max-width: 420px){
  header, main, section, article, footer,
  .container, .wrapper, .content, .page{
    padding-left:12px !important;
    padding-right:12px !important;
  }

  nav, nav ul, .nav, .navbar, .menu{
    gap:8px !important;
  }

  nav a, .nav a, .navbar a, .menu a,
  button, .btn, input[type="button"], input[type="submit"]{
    width:auto !important;
    max-width:100% !important;
    padding:9px 12px !important;
  }
}
</style>

</head>

      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
