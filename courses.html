
<!DOCTYPE html>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/church-style.css">

<style id="professional-mobile-responsive">
/* Preserve the professional desktop look, only adapt sizing/layout for phones */
:root{
  --mobile-page-pad: clamp(14px, 4vw, 22px);
  --mobile-radius: 18px;
}

html{
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

html, body{
  width:100%;
  max-width:100%;
  overflow-x:hidden !important;
}

*, *::before, *::after{
  box-sizing:border-box;
}

img, video, canvas, svg, iframe{
  max-width:100% !important;
  height:auto !important;
}

audio{
  width:100% !important;
  max-width:100% !important;
}

table{
  width:100%;
  max-width:100%;
  border-collapse:collapse;
}

@media (max-width: 820px){
  body{
    margin:0 !important;
    min-width:0 !important;
    font-size:16px !important;
    line-height:1.75 !important;
  }

  header, nav, main, section, article, footer,
  .container, .wrapper, .content, .page, .card, .box{
    width:100% !important;
    max-width:100% !important;
  }

  header, main, section, article, footer,
  .container, .wrapper, .content, .page{
    padding-left:var(--mobile-page-pad) !important;
    padding-right:var(--mobile-page-pad) !important;
  }

  h1{
    font-size:clamp(28px, 8vw, 42px) !important;
    line-height:1.25 !important;
    letter-spacing:0 !important;
  }

  h2{
    font-size:clamp(23px, 6.3vw, 32px) !important;
    line-height:1.3 !important;
  }

  h3{
    font-size:clamp(19px, 5.2vw, 26px) !important;
    line-height:1.35 !important;
  }

  p, li, a, label, input, textarea, select, button{
    font-size:clamp(15px, 4.2vw, 18px) !important;
  }

  nav, nav ul, .nav, .navbar, .menu{
    display:flex !important;
    flex-wrap:wrap !important;
    justify-content:center !important;
    align-items:center !important;
    gap:10px !important;
  }

  nav ul, .menu{
    padding:0 !important;
    margin:0 !important;
    list-style:none !important;
  }

  nav a, .nav a, .navbar a, .menu a,
  button, .btn, input[type="button"], input[type="submit"]{
    min-height:44px !important;
    padding:10px 14px !important;
    border-radius:999px !important;
    display:inline-flex !important;
    align-items:center !important;
    justify-content:center !important;
    text-align:center !important;
    white-space:normal !important;
  }

  .grid, .cards, .row, .columns, .services, .gallery{
    display:grid !important;
    grid-template-columns:1fr !important;
    gap:16px !important;
  }

  [style*="display:flex"], .flex{
    flex-wrap:wrap !important;
  }

  .card, .box, .item, .service, .lesson, .hymn{
    width:100% !important;
    max-width:100% !important;
    border-radius:var(--mobile-radius) !important;
    margin-left:auto !important;
    margin-right:auto !important;
  }

  input, textarea, select{
    width:100% !important;
    max-width:100% !important;
    min-height:44px !important;
  }

  table{
    display:block !important;
    overflow-x:auto !important;
    white-space:nowrap !important;
    -webkit-overflow-scrolling:touch !important;
  }

  iframe{
    width:100% !important;
    min-height:220px !important;
  }

  .theme-toggle,
  .theme-toggle-btn,
  #themeToggle,
  #theme-toggle{
    width:52px !important;
    height:52px !important;
    min-width:52px !important;
    min-height:52px !important;
    position:fixed !important;
    bottom:18px !important;
    left:18px !important;
    right:auto !important;
    z-index:999999 !important;
    border-radius:50% !important;
    padding:0 !important;
  }
}

@media (max-width: 420px){
  header, main, section, article, footer,
  .container, .wrapper, .content, .page{
    padding-left:12px !important;
    padding-right:12px !important;
  }

  nav, nav ul, .nav, .navbar, .menu{
    gap:8px !important;
  }

  nav a, .nav a, .navbar a, .menu a,
  button, .btn, input[type="button"], input[type="submit"]{
    width:auto !important;
    max-width:100% !important;
    padding:9px 12px !important;
  }
}
</style>

</head>
<body class="bg-light">
